<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flashcards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="home.css">
</head>
<body>
  <div class="glow glow-warm"></div>
  <div class="glow glow-cool"></div>

  <main class="home">
    <header class="masthead">
      <h1>Flash<em>cards</em></h1>
      <p class="sub">Escolha um idioma para começar a sessão</p>
    </header>

    <div class="langs">
      <a class="lang lang-zh" href="chinese.html">
        <span class="lang-glyph">汉</span>
        <span class="lang-name">Chinês</span>
        <span class="lang-desc">汉字 · pinyin · áudio</span>
        <span class="lang-cta">Estudar <span class="arrow">→</span></span>
      </a>

      <div class="lang lang-en lang-disabled" aria-disabled="true">
        <span class="badge">Em breve</span>
        <span class="lang-glyph">A</span>
        <span class="lang-name">Inglês</span>
        <span class="lang-desc">vocabulário · frases</span>
        <span class="lang-cta">Em construção</span>
      </div>
    </div>
  </main>
</body>
</html>
